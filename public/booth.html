<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pict-HnCute - Photo Booth</title>
    
    <script src="js/gatekeeper.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/image-analyzer.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/timer-loader.js"></script>

    <style>
        @font-face { font-family: 'Zoika'; src: url('event/Zoika.ttf') format('truetype'); }
        .font-zoika { font-family: 'Zoika', sans-serif; }
        body { background-color: #CFCB98; font-family: system-ui, sans-serif; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-touch-callout: none; }
        #player { display: none; }
        #musicButton {
            position: fixed; top: 20px; right: 20px; padding: 12px 20px; background-color: #ffffff10;
            color: white; border: 1px solid white; border-radius: 8px; cursor: pointer; z-index: 9999;
            font-weight: bold; backdrop-filter: blur(5px);
        }
        #musicButton:hover { background-color: #ffffff30; }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }
        #flash { pointer-events: none; animation: flashAnim 0.2s ease-out forwards; }
        @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }
        .animate-aosp-text {
            background: linear-gradient(90deg, #FFFBC4 30%, #FFFFFF 50%, #FFFBC4 70%);
            background-size: 200% auto; color: #FFFBC4; background-clip: text;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: shimmer 3s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col items-center justify-start relative p-4 gap-4">

    <div class="fixed inset-0 z-0 pointer-events-none opacity-100" style="background-image: url('event/dor.svg'); background-repeat: repeat; background-size: 500px;"></div>

    <div class="absolute top-2 right-2 md:fixed md:top-4 md:right-4 z-40 shrink-0">
         <div class="bg-[#FFFBC4] text-[#B2AE81] px-3 py-1.5 rounded-xl shadow-lg flex items-center gap-2 scale-90 origin-top-right md:scale-100">
            <span class="iconify text-2xl" data-icon="solar:clock-circle-outline"></span>
            <span id="timer-display" class="font-zoika text-2xl tracking-widest pt-1">3:40</span>
        </div>
    </div>

    <div class="flex flex-col md:flex-row w-full max-w-[1920px] mx-auto items-center justify-center gap-6 relative z-10 flex-1 py-12">
        
        <div class="relative w-full md:w-auto md:flex-1 md:max-w-[65vw] aspect-[4/3] max-h-[55vh] md:max-h-[85vh] flex flex-col shrink-0 transition-all duration-300 rounded-[2rem] shadow-lg overflow-hidden border-4 border-[#FFFBC4]">
             <div class="flex-1 relative bg-gray-900 overflow-hidden rounded-[1.8rem]">
                 <video id="video" autoplay playsinline class="w-full h-full object-cover transform scale-x-[-1]"></video>
                 
                 <div id="flash" class="absolute inset-0 bg-white opacity-0 z-20 hidden"></div>
                 <div id="countdownText" class="absolute inset-0 flex items-center justify-center z-20 hidden pointer-events-none">
                     <div class="relative w-20 h-20 md:w-28 md:h-28 bg-[#979363]/30 backdrop-blur-md rounded-full flex items-center justify-center shadow-lg">
                         <svg class="absolute inset-0 w-full h-full -rotate-90 overflow-visible" viewBox="0 0 100 100">
                             <circle cx="50" cy="50" r="46" fill="none" stroke="#FFFBC4" stroke-width="5" class="opacity-20"></circle>
                             <circle id="countdown-progress" cx="50" cy="50" r="46" fill="none" stroke="#FFFBC4" stroke-width="5" 
                                     stroke-dasharray="289" stroke-dashoffset="289" stroke-linecap="round"></circle>
                         </svg>
                         <span id="countdown-number" class="font-zoika text-[#FFFBC4] text-6xl md:text-7xl pt-2 transform transition-transform">3</span>
                     </div>
                 </div>
                 <div id="messageOverlay" class="absolute inset-0 flex items-center justify-center bg-black/80 text-white font-zoika text-2xl z-10 hidden text-center p-4"></div>
             </div>
        </div>

        <div class="relative w-full md:w-auto md:h-auto flex flex-col gap-3 md:gap-4 shrink-0 flex-none justify-center items-center">
            
            <h1 class="font-zoika text-[#FFFBC4] text-4xl md:text-5xl tracking-wide text-center drop-shadow-sm">Preview</h1>

            <div class="flex flex-col items-center justify-center h-auto overflow-hidden w-full md:w-auto">
                
                <div id="templateContainer" class="relative bg-gray-100 overflow-hidden mx-auto transition-all w-auto max-w-full aspect-[3/4] max-h-[55vh] md:max-h-[70vh] md:w-auto object-contain flex-shrink-0 rounded-[2rem] shadow-lg border-4 border-[#FFFBC4]">
                    <div id="photosGrid" class="absolute inset-0 grid gap-1 p-1"></div>
                    <img id="frameOverlay" src="" class="relative z-10 w-full h-full pointer-events-none" alt="Template Frame">
                </div>
            </div>

            <div class="w-full flex gap-2">
                <button id="actionBtn" class="flex-1 py-3 md:py-3.5 bg-[#B2AE81] text-[#FFFBC4] font-zoika text-xl md:text-xl rounded-full shadow-lg hover:brightness-105 transition-all active:scale-95 flex items-center justify-center gap-2 md:gap-3 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span class="iconify text-2xl md:text-2xl" data-icon="solar:camera-bold"></span>
                    <span class="pt-1">Mulai Foto</span>
                </button>

                <label id="demoUploadBtn" class="hidden w-16 py-3 md:py-3.5 bg-[#7C7850] text-[#FFFBC4] rounded-full shadow-lg hover:brightness-105 transition-all active:scale-95 items-center justify-center cursor-pointer">
                    <input type="file" id="demoFileInput" accept="image/*" class="hidden">
                    <span class="iconify text-2xl" data-icon="solar:upload-square-bold"></span>
                </label>
            </div>
        </div>
    </div>

    <div id="toast" class="fixed top-20 right-4 transform translate-x-[150%] transition-transform duration-300 z-50 bg-[#FFFBC4] text-[#B2AE81] rounded-xl p-4 shadow-lg flex items-center gap-3 max-w-xs border border-[#B2AE81]/20">
        <span class="iconify text-2xl" data-icon="mdi:information-outline"></span>
        <div class="font-zoika text-lg pt-1" id="toast-message">Notification</div>
    </div>
    
    <div id="confirm-modal" class="fixed inset-0 z-50 bg-black/60 backdrop-blur-sm flex items-center justify-center hidden px-4">
        <div class="modal-content bg-[#FFFBC4] rounded-[2rem] p-6 max-w-sm w-full text-center shadow-2xl">
            <h2 class="text-2xl font-zoika mb-2 text-[#B2AE81] pt-1" id="modal-title">Konfirmasi</h2>
            <p class="font-sans text-[#B2AE81]/80 mb-6 font-medium" id="modal-desc">Are you sure?</p>
            <div class="flex gap-4 justify-center">
                <button id="modal-cancel" class="px-6 py-2 border-2 border-[#B2AE81] text-[#B2AE81] rounded-full font-zoika pt-1 hover:bg-[#B2AE81]/10 transition-colors">Batal</button>
                <button id="modal-confirm" class="px-6 py-2 bg-[#B2AE81] text-[#FFFBC4] rounded-full font-zoika pt-1 hover:brightness-105 transition-colors shadow-md">Ya</button>
            </div>
        </div>
    </div>

    <div id="timeout-popup" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4">
         <div class="modal-content bg-[#FFFBC4] w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl relative border-4 border-[#B2AE81]">
            <div class="w-20 h-20 bg-[#B2AE81] rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg">
                 <span class="iconify text-5xl text-[#FFFBC4]" data-icon="bpmn:end-event-cancel"></span>
            </div>
            <h2 class="font-zoika text-[#7C7850] text-3xl mb-4">Sesi Berakhir</h2>
            <p class="text-[#7C7850] text-lg mb-8 leading-relaxed font-medium">
                Sesi anda berakhir, anda akan diarahkan ke halaman utama.
            </p>
            <button onclick="window.location.href='index.html'" class="w-full h-16 bg-[#7C7850] text-[#FFFBC4] font-zoika text-2xl rounded-xl shadow-lg hover:brightness-110 active:scale-95 transition-all">
                Baik Boss
            </button>
         </div>
    </div>

    <script>
        let player;
        const startTime = 227;
        const endTime = 261;
        
        window.onYouTubeIframeAPIReady = function() {
            player = new YT.Player('player', {
                height: '0', width: '0', videoId: 'd4OMqGKBl6E',
                playerVars: { autoplay: 0, start: startTime, end: endTime, controls: 0, loop: 1, playlist: 'd4OMqGKBl6E' },
                events: { onReady: () => { document.getElementById('musicButton').disabled = false; document.getElementById('musicButton').innerText = "Mainkan Musik 🎵"; } }
            });
        };
        document.getElementById('musicButton')?.addEventListener('click', () => { if (player) { player.playVideo(); document.getElementById('musicButton').style.display = 'none'; } });
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="js/transitions.js"></script>
    <script src="js/booth.js"></script>
</body>
</html>

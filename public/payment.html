<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pict-HnCute - Payment</title>
    <script src="js/gatekeeper.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lottie-web/5.12.2/lottie.min.js"></script>
    <script src="js/invoice-assets.js"></script>
    <style>
        @font-face { font-family: 'Zoika'; src: url('event/Zoika.ttf') format('truetype'); }
        .font-zoika { font-family: 'Zoika', serif; }
        body { background-color: #CFCB98; user-select: none; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #B2AE81; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .shine-overlay {
            position: absolute; inset: 0; width: 100%; height: 100%; z-index: 20; pointer-events: none;
            -webkit-mask-image: url('event/pay.webp'); mask-image: url('event/pay.webp');
            -webkit-mask-size: contain; mask-size: contain; -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            -webkit-mask-position: center; mask-position: center;
        }
        .shine-overlay::after {
            content: ""; position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 40% { left: 200%; } 100% { left: 200%; } }
        #virtual-keyboard {
            position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(255, 251, 196, 0.95);
            backdrop-filter: blur(10px); padding: 10px; z-index: 60; border-top: 1px solid #B2AE81;
            display: none; flex-direction: column; gap: 5px; box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            transform: translateY(100%); transition: transform 0.3s ease-out;
        }
        #virtual-keyboard.active { display: flex; transform: translateY(0); }
        .kb-row { display: flex; justify-content: center; gap: 5px; }
        .kb-key {
            background: #fff; color: #5C5A40; border: 1px solid #B2AE81; border-radius: 8px; padding: 10px;
            min-width: 35px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 0 #B2AE81;
            transition: transform 0.1s, box-shadow 0.1s; font-family: sans-serif; flex: 1;
            max-width: 60px; display: flex; align-items: center; justify-content: center; height: 45px;
        }
        .kb-key:active { transform: translateY(2px); box-shadow: none; }
        .kb-key.wide { flex: 1.5; max-width: 80px; }
        .kb-key.space { flex: 4; max-width: 300px; }
        .kb-action { background: #B2AE81; color: #FFFBC4; }
    </style>
</head>

    <script>
        const user = Auth.getUser();
        let pollInterval = null;
        let currentOrderId = null;
        let currentAmount = 0;
        let originalPrice = 0;
        let appliedDiscount = 0; 
        let lottieInstance = null;
        let tutorialTimeout;

        document.addEventListener('DOMContentLoaded', async () => {
             tutorialTimeout = setTimeout(skipTutorial, 10000);

            gsap.fromTo(".gsap-reveal", 
                 { opacity: 0, y: 30 },
                 {
                     duration: 1,
                     y: 0,
                     opacity: 1,
                     stagger: 0.2,
                     ease: "power3.out",
                     delay: 0.1,
                     onComplete: () => {
                        gsap.to("#logo-float", { y: -15, duration: 2, repeat: -1, yoyo: true, ease: "sine.inOut" });
                        gsap.to("#tutorial-logo-float", { y: -15, duration: 2, repeat: -1, yoyo: true, ease: "sine.inOut" });
                     }
                 }
             );

            if (!user) return window.location.href = 'login.html';

            try {
                const confRes = await fetch(`/api/hncute-payment?username=${user.username}`);
                const confData = await confRes.json();
                const config = confData.config || {};

                originalPrice = config.price !== undefined ? config.price : 0;
                
                const qrisOn = (config.enable_qris !== undefined) ? config.enable_qris : (config.enabled || false);
                const voucherOn = (config.enable_voucher !== undefined) ? config.enable_voucher : true;

                if (!qrisOn) document.getElementById('qris-btn').classList.add('hidden');
                if (!voucherOn) document.getElementById('voucher-btn').classList.add('hidden');

                if (!qrisOn && !voucherOn) {
                    document.getElementById('no-payment-msg').classList.remove('hidden');
                }

                if (qrisOn) {
                    loadQR(originalPrice);
                }

            } catch(e) { console.error(e); }
            
            document.getElementById('coupon-code').addEventListener('focus', () => { toggleKeyboard(true); });
            document.getElementById('coupon-code').addEventListener('click', () => { toggleKeyboard(true); });
        });

        function skipTutorial() {
            if (tutorialTimeout) clearTimeout(tutorialTimeout);
            const tutorial = document.getElementById('tutorial-section');
            const main = document.getElementById('main-payment-section');
            
            gsap.to(tutorial, { opacity: 0, duration: 0.5, onComplete: () => {
                tutorial.classList.add('hidden');
                main.classList.remove('hidden');
                gsap.fromTo(main, { opacity: 0, scale: 0.95 }, { opacity: 1, scale: 1, duration: 0.5 });
            }});
        }

        async function loadQR(amount) {
            const img = document.getElementById('qris-img');
            const loader = document.getElementById('qris-load');
            const err = document.getElementById('error-msg');
            const checkBtn = document.getElementById('btn-check-status');
            
            img.classList.add('hidden');
            checkBtn.classList.add('hidden');
            loader.classList.remove('hidden');

            try {
                const res = await fetch(`/api/qris?amount=${amount}&username=${user.username}`);
                const data = await res.json();

                if (data.error) throw new Error(data.error);

                document.getElementById('summ-price').textContent = `Rp ${originalPrice.toLocaleString()}`;
                
                if (appliedDiscount > 0) {
                     document.getElementById('row-discount').classList.remove('hidden');
                     document.getElementById('summ-discount').textContent = `-Rp ${appliedDiscount.toLocaleString()}`;
                } else {
                     document.getElementById('row-discount').classList.add('hidden');
                }

                document.getElementById('summ-fee').textContent = `Rp ${(data.fee || 0).toLocaleString()}`;
                document.getElementById('summ-total').textContent = `Rp ${(data.total || amount).toLocaleString()}`;

                img.src = data.qr_url;
                img.onload = () => {
                    loader.classList.add('hidden');
                    img.classList.remove('hidden');
                    checkBtn.classList.remove('hidden');

                    if (data.order_id) {
                        currentOrderId = data.order_id;
                        currentAmount = data.amount; 
                        startPolling(data.order_id, data.amount);
                    }
                };

            } catch (e) {
                loader.classList.add('hidden');
                err.textContent = e.message;
                err.classList.remove('hidden');
            }
        }

        async function redeemCoupon() {
            const code = document.getElementById('coupon-code').value.trim();
            if (!code) return showToast("Enter code");

            const btn = document.getElementById('btn-redeem');
            btn.disabled = true; btn.textContent = "...";

            try {
                const checkRes = await fetch('/api/verify_payment', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ type: 'check_coupon', code, creator: user.username })
                });
                const checkData = await checkRes.json();
                
                if (!checkData.success) {
                     showToast(checkData.error || "Invalid Coupon");
                     btn.disabled = false; btn.textContent = "Redeem";
                     return;
                }

                const coupon = checkData.coupon;

                if (coupon.type === 'free') {
                     const redeemRes = await fetch('/api/verify_payment', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ type: 'coupon', code, creator: user.username })
                    });
                    if ((await redeemRes.json()).success) {
                        showToast("Voucher Applied! Free Access.");
                        setTimeout(() => window.location.href = 'template-selection.html', 1500);
                    } else {
                        showToast("Redemption failed");
                        btn.disabled = false; btn.textContent = "Redeem";
                    }

                } else if (coupon.type === 'discount') {
                    const discountPercent = coupon.value || 0;
                    appliedDiscount = Math.floor(originalPrice * (discountPercent / 100));
                    let newTotal = originalPrice - appliedDiscount;
                    if (newTotal < 0) newTotal = 0;

                    const redeemRes = await fetch('/api/verify_payment', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ type: 'coupon', code, creator: user.username })
                    });
                    
                    if ((await redeemRes.json()).success) {
                        showToast(`Discount ${discountPercent}% Applied!`);
                        closeModal('modal-coupon');
                        toggleKeyboard(false);
                        loadQR(newTotal);
                        openModal('modal-qris');
                    } else {
                        showToast("Redemption failed");
                    }
                    btn.disabled = false; btn.textContent = "Redeem";
                }

            } catch(e) {
                console.error(e);
                showToast("Error processing voucher");
                btn.disabled = false; btn.textContent = "Redeem";
            }
        }

        async function checkPaymentStatus(orderId, baseAmount, isManual = false) {
            try {
                const res = await fetch('/api/verify_payment', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        type: 'qris',
                        creator: user.username,
                        amount: baseAmount,
                        orderId: orderId
                    })
                });

                const data = await res.json();

                if (res.ok && data.success) {
                    if (pollInterval) clearInterval(pollInterval);
                    if (isManual) {
                        updateStatusToSuccess();
                    } else {
                        showToast("Payment Successful!");
                        setTimeout(() => window.location.href = 'template-selection.html', 1500);
                    }
                    return true;
                } else if (isManual) {
                    const statusText = document.getElementById('modal-status-text');
                    statusText.textContent = (data.status || "PENDING").toUpperCase();
                }
            } catch(e) {
                if (isManual) {
                     const statusText = document.getElementById('modal-status-text');
                     statusText.textContent = "ERROR";
                }
            }
            return false;
        }

        function startPolling(orderId, baseAmount) {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(() => {
                checkPaymentStatus(orderId, baseAmount, false);
            }, 3000);
        }

        function manualCheck() {
            if (currentOrderId) {
                openStatusModal();
                setTimeout(() => {
                    checkPaymentStatus(currentOrderId, currentAmount, true);
                }, 500);
            }
        }

        const modalTimeouts = {};
        function openModal(modalId) {
            if (modalTimeouts[modalId]) { clearTimeout(modalTimeouts[modalId]); delete modalTimeouts[modalId]; }
            const modal = document.getElementById(modalId);
            const content = document.getElementById(modalId + '-content');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); content.classList.add('scale-100'); }, 10);
        }
        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            const content = document.getElementById(modalId + '-content');
            content.classList.remove('scale-100'); content.classList.add('scale-95'); modal.classList.add('opacity-0');
            modalTimeouts[modalId] = setTimeout(() => { modal.classList.add('hidden'); delete modalTimeouts[modalId]; }, 300);
            if(modalId === 'modal-coupon') toggleKeyboard(false);
        }

        function openStatusModal() {
            const modal = document.getElementById('status-modal');
            const content = document.getElementById('status-modal-content');
            const lottieContainer = document.getElementById('lottie-container');
            const statusText = document.getElementById('modal-status-text');
            statusText.textContent = "CHECKING...";
            if (lottieInstance) lottieInstance.destroy();
            if (typeof lottieAssets !== 'undefined') {
                lottieInstance = lottie.loadAnimation({ container: lottieContainer, renderer: 'svg', loop: true, autoplay: true, animationData: lottieAssets.loader });
            }
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); content.classList.remove('scale-95'); content.classList.add('scale-100'); }, 10);
        }

        function closeStatusModal() {
            const modal = document.getElementById('status-modal');
            const content = document.getElementById('status-modal-content');
            content.classList.remove('scale-100'); content.classList.add('scale-95'); modal.classList.add('opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); if (lottieInstance) lottieInstance.destroy(); }, 300);
        }

        function updateStatusToSuccess() {
            const statusText = document.getElementById('modal-status-text');
            const lottieContainer = document.getElementById('lottie-container');
            statusText.textContent = "SUCCESS!";
            if (lottieInstance) lottieInstance.destroy();
             if (typeof lottieAssets !== 'undefined') {
                lottieInstance = lottie.loadAnimation({ container: lottieContainer, renderer: 'svg', loop: false, autoplay: true, animationData: lottieAssets.success });
            }
            setTimeout(() => { window.location.href = 'template-selection.html'; }, 2000);
        }

        function showToast(msg) {
            const t = document.getElementById('toast'); document.getElementById('toast-msg').textContent = msg;
            gsap.to(t, { y: '50%', duration: 0.3, onComplete: () => { setTimeout(() => gsap.to(t, { y: '-150%', duration: 0.3 }), 2000); }});
        }
        
        function toggleKeyboard(show) {
            const kb = document.getElementById('virtual-keyboard');
            if(show) kb.classList.add('active');
            else kb.classList.remove('active');
        }
        
        function kbType(char) {
            const input = document.getElementById('coupon-code');
            input.value += char;
            input.focus();
        }
        
        function kbBack() {
             const input = document.getElementById('coupon-code');
             input.value = input.value.slice(0, -1);
             input.focus();
        }
        
        function kbClear() {
             const input = document.getElementById('coupon-code');
             input.value = '';
             input.focus();
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pict-HnCute - Pilih Template</title>
    <script src="js/gatekeeper.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/animations.js"></script>
    <script src="js/timer-loader.js"></script>
    <style>
        @font-face { font-family: 'Zoika'; src: url('event/Zoika.ttf') format('truetype'); font-display: swap; }
        body { background-color: #CFCB98; -webkit-tap-highlight-color: transparent; overscroll-behavior: none; }
        .font-zoika { font-family: 'Zoika', serif; }
        .custom-scrollbar::-webkit-scrollbar { width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #B2AE81; border-radius: 99px; border: 2px solid #FFFBC4; }
        .filter-btn.active { background-color: #B2AE81; color: #FFFBC4; }
        .filter-btn:not(.active) { color: #B2AE81; }
        .filter-btn:hover:not(.active) { background-color: #F0F0E0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="h-[100dvh] w-full overflow-hidden flex flex-col relative select-none" oncontextmenu="return false">

    <div class="absolute inset-0 z-0 pointer-events-none opacity-100" style="background-image: url('event/dor.svg'); background-repeat: repeat; background-size: 500px;"></div>

    <div class="relative z-10 w-full h-full max-w-7xl mx-auto p-4 md:p-6 flex flex-col gap-4 md:gap-6">
        
        <div class="flex flex-wrap md:flex-nowrap items-center justify-between gap-4 shrink-0">
            <div class="ml-auto bg-[#FFFBC4] text-[#B2AE81] px-4 py-2 rounded-xl shadow-lg flex items-center gap-2">
                <span class="iconify text-2xl md:text-3xl opacity-80" data-icon="solar:clock-circle-outline"></span>
                <span class="timer-text font-zoika text-2xl md:text-3xl tracking-widest pt-1">1:40</span>
            </div>
        </div>

        <div id="filterContainer" class="w-max max-w-full bg-[#FFFBC4] rounded-full p-1.5 flex gap-1 shadow-lg overflow-x-auto no-scrollbar"></div>

        <div class="flex-1 min-h-0 grid grid-cols-1 md:grid-cols-12 gap-6 relative">
            
            <div class="md:col-span-8 bg-[#FFFBC4] rounded-[2rem] shadow-xl flex flex-col min-h-0 overflow-hidden relative">
                <div id="loadingState" class="absolute inset-0 flex flex-col items-center justify-center z-20 bg-[#FFFBC4]">
                    <span class="iconify text-5xl text-[#B2AE81] animate-spin mb-4" data-icon="ei:spinner-3"></span>
                    <p class="font-bold text-[#B2AE81]">Memuat Template...</p>
                </div>
                
                <div id="scrollContainer" class="flex-1 overflow-y-auto custom-scrollbar p-4 pb-48 md:p-8 md:pb-8 w-full">
                    <div id="templateGrid" class="relative w-full"></div>
                </div>
            </div>

            <div class="md:col-span-4 flex flex-col md:justify-center items-center gap-4 md:gap-6 pointer-events-none md:pointer-events-auto absolute bottom-0 left-0 right-0 md:static p-4 md:p-0 bg-gradient-to-t from-[#CFCB98] via-[#CFCB98] to-transparent md:bg-none z-30 md:z-auto md:h-full min-h-0">
                <h2 class="hidden md:block text-5xl font-zoika text-[#FFFBC4] tracking-wide text-center drop-shadow-sm shrink-0">Preview</h2>
                <div id="previewCard" class="hidden md:flex relative aspect-[3/4] w-2/3 md:w-full max-w-xs max-h-[60vh] overflow-hidden items-center justify-center shrink-1">
                    <p id="previewPlaceholder" class="text-[#FFFBC4] font-bold text-lg opacity-80">Pilih Template</p>
                    <img id="previewImage" class="absolute inset-0 w-full h-full object-contain hidden pointer-events-auto" alt="Preview">
                </div>
                <button id="startBtn" disabled class="pointer-events-auto w-full max-w-xs bg-[#B2AE81] text-[#FFFBC4] py-3 md:py-4 px-8 rounded-full font-zoika text-2xl md:text-3xl shadow-lg transform transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed hover:brightness-105 flex items-center justify-center gap-3">
                    <span class="pt-1">Mulai Sesi Foto</span>
                </button>
            </div>
        </div>
    </div>

    <div id="timeoutPopup" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4">
         <div class="bg-[#FFFBC4] w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl relative border-4 border-[#B2AE81]">
            <h2 class="font-zoika text-[#7C7850] text-3xl mb-4">Sesi Berakhir</h2>
            <button onclick="window.location.href='index.html'" class="w-full h-16 bg-[#7C7850] text-[#FFFBC4] font-zoika text-2xl rounded-xl">Baik Boss</button>
         </div>
    </div>

    <div id="startPopup" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4">
         <div class="bg-[#FFFBC4] w-full max-w-sm rounded-[2rem] p-8 text-center shadow-2xl relative border-4 border-[#B2AE81]">
            <h2 class="font-zoika text-[#7C7850] text-3xl mb-4">Hi User!</h2>
            <p class="text-[#7C7850] text-lg mb-8">Anda diberi waktu 3:40 menit untuk berpose.</p>
            <button id="confirmStartBtn" class="w-full h-16 bg-[#7C7850] text-[#FFFBC4] font-zoika text-2xl rounded-xl">Shapp Minn</button>
         </div>
    </div>

    <div id="mobilePreviewModal" class="fixed inset-0 z-[100] bg-black/80 backdrop-blur-sm hidden items-center justify-center p-4">
         <div class="bg-[#FFFBC4] w-full max-w-sm rounded-[2rem] p-4 text-center shadow-2xl relative border-4 border-[#B2AE81] flex flex-col gap-4">
            <button id="closeMobilePreview" class="absolute top-2 right-2 w-10 h-10 bg-[#B2AE81] text-[#FFFBC4] rounded-full flex items-center justify-center z-10">
                 <span class="iconify text-2xl" data-icon="solar:close-circle-bold"></span>
            </button>
            <div class="relative w-full aspect-[3/4] rounded-xl overflow-hidden">
                <img id="mobilePreviewImage" src="" class="w-full h-full object-contain">
            </div>
            <button id="mobileUseTemplateBtn" class="w-full h-14 bg-[#7C7850] text-[#FFFBC4] font-zoika text-xl rounded-xl">Mulai Sesi Foto</button>
         </div>
    </div>

    <script>
        let allTemplates = [];
        let filteredTemplates = [];
        let currentFilter = 'All';
        let selectedTemplate = null;
        let timerInterval;
        let timeLeft = 100;
        
        let vs = { itemHeight: 0, itemWidth: 0, cols: 2, gap: 16, totalHeight: 0, renderedRange: { start: -1, end: -1 }, activeNodes: new Map() };

        const grid = document.getElementById('templateGrid');
        const scrollContainer = document.getElementById('scrollContainer');
        const filterContainer = document.getElementById('filterContainer');

        document.addEventListener('DOMContentLoaded', async () => {
            const config = await TimerConfig.load();
            timeLeft = config.template || 100;
            startTimer();
            await fetchData();
            window.addEventListener('resize', () => { setTimeout(initVirtualScroll, 100); });
            scrollContainer.addEventListener('scroll', onScroll, { passive: true });
        });

        function startTimer() {
            updateTimer();
            timerInterval = setInterval(() => { timeLeft--; updateTimer(); if (timeLeft <= 0) { clearInterval(timerInterval); window.GSAPManager.openModal(document.getElementById('timeoutPopup')); } }, 1000);
        }
        function updateTimer() {
            const m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.querySelectorAll('.timer-text').forEach(el => el.textContent = `${m}:${s.toString().padStart(2, '0')}`);
        }

        async function fetchData() {
            try {
                const res = await fetch('/api/content?type=template&all=true');
                const data = await res.json();
                allTemplates = Array.isArray(data) ? data : [];
                
                generateFilters();
                applyFilter('All');
                document.getElementById('loadingState').classList.add('hidden');
            } catch (e) { console.error(e); }
        }

        function generateFilters() {
            const tags = new Set(['All']);
            allTemplates.forEach(t => {
                if (t.tags && Array.isArray(t.tags)) {
                    t.tags.forEach(tag => tags.add(tag));
                }
            });

            filterContainer.innerHTML = '';
            tags.forEach(tag => {
                const btn = document.createElement('button');
                btn.className = `filter-btn px-6 py-2 rounded-full font-bold text-sm md:text-base transition-colors whitespace-nowrap ${tag === 'All' ? 'active' : ''}`;
                btn.textContent = tag;
                btn.onclick = () => {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    applyFilter(tag);
                };
                filterContainer.appendChild(btn);
            });
        }

        function applyFilter(tag) {
            currentFilter = tag;
            if (tag === 'All') {
                filteredTemplates = [...allTemplates];
            } else {
                filteredTemplates = allTemplates.filter(t => t.tags && t.tags.includes(tag));
            }
            
            filteredTemplates.sort((a,b) => b.createdAt - a.createdAt);

            grid.innerHTML = ''; vs.activeNodes.clear(); vs.renderedRange = { start: -1, end: -1 };
            scrollContainer.scrollTop = 0;
            initVirtualScroll();
        }

        let ticking = false;
        function onScroll() { if (!ticking) { window.requestAnimationFrame(() => { renderVirtualGrid(); ticking = false; }); ticking = true; } }

        function initVirtualScroll() {
            const isDesktop = window.innerWidth >= 768;
            vs.cols = isDesktop ? 3 : 2; vs.gap = isDesktop ? 24 : 16;
            const containerWidth = scrollContainer.clientWidth - (isDesktop ? 64 : 32);
            vs.itemWidth = (containerWidth - (vs.gap * (vs.cols - 1))) / vs.cols;
            vs.itemHeight = vs.itemWidth * (4/3);
            const rows = Math.ceil(filteredTemplates.length / vs.cols);
            vs.totalHeight = rows > 0 ? (rows * vs.itemHeight) + ((rows - 1) * vs.gap) : 0;
            grid.style.height = `${vs.totalHeight}px`;
            renderVirtualGrid();
        }

        function renderVirtualGrid() {
            const scrollTop = scrollContainer.scrollTop;
            const rowHeight = vs.itemHeight + vs.gap;
            const startRow = Math.floor(Math.max(0, scrollTop - scrollContainer.clientHeight) / rowHeight);
            const endRow = Math.ceil((scrollTop + scrollContainer.clientHeight * 2) / rowHeight);

            let startIndex = startRow * vs.cols;
            let endIndex = Math.min(filteredTemplates.length - 1, (endRow * vs.cols) + (vs.cols - 1));

            for (const [idx, node] of vs.activeNodes) { if (idx < startIndex || idx > endIndex) { node.remove(); vs.activeNodes.delete(idx); } }

            for (let i = startIndex; i <= endIndex; i++) {
                if (!vs.activeNodes.has(i)) {
                    const node = createCard(filteredTemplates[i], i);
                    grid.appendChild(node);
                    vs.activeNodes.set(i, node);
                }
            }
        }

        function createCard(t, i) {
            const div = document.createElement('div');
            const row = Math.floor(i / vs.cols), col = i % vs.cols;
            div.style.position = 'absolute'; div.style.top = `${row*(vs.itemHeight+vs.gap)}px`; div.style.left = `${col*(vs.itemWidth+vs.gap)}px`;
            div.style.width = `${vs.itemWidth}px`; div.style.height = `${vs.itemHeight}px`;
            
            const isSel = selectedTemplate && selectedTemplate.id === t.id;
            div.className = `group cursor-pointer bg-white/50 rounded-xl overflow-hidden flex items-center justify-center transition-all duration-200 hover:shadow-md z-10 ${isSel ? 'border-4 border-[#B2AE81]' : 'border border-transparent'}`;
            div.onclick = (e) => { e.stopPropagation(); selectTemplate(t); };
            div.innerHTML = `<img src="${t.src}" class="w-full h-full object-contain p-1" loading="lazy">`;
            return div;
        }

        function selectTemplate(t) {
            selectedTemplate = t;
            document.getElementById('previewImage').src = t.src;
            document.getElementById('previewImage').classList.remove('hidden');
            document.getElementById('previewPlaceholder').classList.add('hidden');
            document.getElementById('startBtn').disabled = false;
            
            for (const [idx, node] of vs.activeNodes) {
                if (filteredTemplates[idx].id === t.id) node.classList.replace('border-transparent', 'border-[#B2AE81]');
                else node.classList.replace('border-[#B2AE81]', 'border-transparent');
            }

            if (window.innerWidth < 768) {
                document.getElementById('mobilePreviewImage').src = t.src;
                window.GSAPManager.openModal(document.getElementById('mobilePreviewModal'));
            }
        }

        document.getElementById('closeMobilePreview').onclick = () => window.GSAPManager.closeModal(document.getElementById('mobilePreviewModal'));
        document.getElementById('mobileUseTemplateBtn').onclick = () => { window.GSAPManager.closeModal(document.getElementById('mobilePreviewModal')); setTimeout(() => window.GSAPManager.openModal(document.getElementById('startPopup')), 250); };
        document.getElementById('startBtn').onclick = () => window.GSAPManager.openModal(document.getElementById('startPopup'));
        document.getElementById('confirmStartBtn').onclick = () => {
            const payload = { ...selectedTemplate, frame: selectedTemplate.src, redirect: 'edit' };
            sessionStorage.setItem('hncuteTemplate', JSON.stringify(payload));
            window.location.href = 'booth.html#enjoy';
        };
    </script>
    <script src="js/transitions.js"></script>
</body>
</html>
